name: 👋 Welcome First-Time Contributor

on:
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.P_R_E_M_I_U_M_TOKEN }}

      - name: Check contributions and legacy
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Count total contributions
            const fs = require("fs");
            const path = require("path");
            
            if (!fs.existsSync("progress")) {
              console.log("No progress directory found.");
              process.exit(0);
            }
            
            const files = fs.readdirSync("progress").filter(f => f.endsWith(".md"));
            let totalEntries = 0;
            files.forEach(file => {
              const content = fs.readFileSync(path.join("progress", file), "utf8");
              const lines = content.split("\n");
              const matches = lines.filter(line => line.includes(author));
              totalEntries += matches.length;
            });

            // 2. Check if Core Member (10+ contributions)
            if (totalEntries >= 10) {
              // Find their current file (Week W17 for example)
              const currentWeek = "2026-W17"; 
              const oldPath = `progress/${currentWeek}.md`;
              const newPath = `archive/${author}.md`;
              const linkPath = `progress/${currentWeek}.md`; // Point back to current spot

              // Move file to Archive
              try {
                fs.copyFileSync(oldPath, newPath);
                fs.writeFileSync(oldPath, `
# 🏛️ Legacy Member

> This account has been archived after reaching Core Member status.
- **Contributions:** ${totalEntries}
- **Status:** 🌟 Core Member
- **Date:** ${new Date().toISOString()}
`,
 "utf8");
                
                // Leave a "Tombstone" in current progress file linking to archive
                fs.writeFileSync(linkPath, `
# ${currentWeek}

> 🏛️ **Legacy Member**

@${author} has graduated to the **[Legacy Archive](${newPath}).
`, "utf8");

                const body = [
                  `Hey @${author} — Congratulations! 👋`,
                  `You have reached **Core Member** status (${totalEntries} contributions) in Weekly Builds Community!`,
                  `This is a huge milestone. You have shown incredible consistency.`,
                  `To celebrate, I have moved your work to the **[Legacy Archive](${newPath}).`,
                  `This file is now your permanent record in this project.`,
                  `Your previous spot in progress/ is now reserved for the next builder.`,
                  `Keep building! You are a legend. 🌟`,
                ].join("\n");

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body,
                });
              } catch (err) {
                console.log("Error moving to archive:", err.message);
              }
            } else {
              console.log(`User has ${totalEntries} entries. Not Core Member yet.`);
            }

      - name: Commit and push (Direct)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: handle core member legacy move"
          git push
