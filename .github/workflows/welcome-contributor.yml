name: 👋 Welcome First-Time Contributor

on:
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.P_R_E_M_I_U_M_TOKEN }}

      - name: Check contributions and comment
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;
            
            const fs = require("fs");
            const path = require("path");
            
            if (!fs.existsSync("progress")) {
              console.log("No progress directory found.");
              process.exit(0);
            }
            
            const files = fs.readdirSync("progress").filter(f => f.endsWith(".md"));
            let totalEntries = 0;
            files.forEach(file => {
              const content = fs.readFileSync(path.join("progress", file), "utf8");
              const lines = content.split("\n");
              const matches = lines.filter(line => line.includes(author));
              totalEntries += matches.length;
            });

            if (totalEntries > 0) {
              const body = [
                `Hey @${author} — Welcome! 👋`,
                `You just joined the community. Great job!`,
                `You have \`\`${totalEntries}\`\` entries so far. Keep building! 🚀`,
              ].join("\n");

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
