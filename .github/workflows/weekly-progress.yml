name: 📅 Weekly Progress Issue

on:
  schedule:
    - cron: "30 0 * * 1"
  workflow_dispatch:
    inputs:
      week_override:
        description: "Override week (e.g. W17) — leave blank to auto-detect"
        required: false
        default: ""

jobs:
  open-weekly-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Get week info
        id: week
        run: |
          YEAR=$(date +%Y)
          WEEK=$(date +%V)
          WEEK_LABEL="W${WEEK}"
          if [ -n "${{ github.event.inputs.week_override }}" ]; then
            WEEK_LABEL="${{ github.event.inputs.week_override }}"
          fi
          echo "year=$YEAR" >> $GITHUB_OUTPUT
          echo "week=$WEEK_LABEL" >> $GITHUB_OUTPUT
          echo "file=progress/${YEAR}-${WEEK_LABEL}.md" >> $GITHUB_OUTPUT

      - name: Create Weekly Issue
        uses: actions/github-script@v7
        with:
          script: |
            const year = "${{ steps.week.outputs.year }}";
            const week = "${{ steps.week.outputs.week }}";
            const file = "${{ steps.week.outputs.file }}";
            const base = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            const title = `Week ${week} — What did you ship?`;
            const body = [
              `## Week ${week}, ${year}`,
              ``,
              `Another week. What did you actually build?`,
              ``,
              `Drop your entry in [${file}](${base}/blob/main/${file}) via a PR and you're in. Takes 5 minutes.`,
              ``,
              `---`,
              ``,
              `### Who showed up last week`,
              ``,
              `| # | Contributor | What they built |`,
              `|---|-------------|-----------------|`,
              `| 1 | — | — |`,
              `| 2 | — | — |`,
              `| 3 | — | — |`,
              ``,
              `> Edit this table with top contributors before sharing on LinkedIn.`,
              ``,
              `---`,
              ``,
              `### Streak wall 🔥`,
              ``,
              `Showing up 4 weeks in a row? You are on the wall.`,
              ``,
              `| Contributor | Weeks |`,
              `|-------------|-------|`,
              `| — | — |`,
              ``,
              `---`,
              ``,
              `### This week`,
              ``,
              `Add your entry here → [${file}](${base}/blob/main/${file})`,
              ``,
              `Format is in [WEEKLY_PROGRESS.md](${base}/blob/main/WEEKLY_PROGRESS.md). One entry per person. No fluff.`,
              ``,
              `---`,
              ``,
              `### LinkedIn`,
              ``,
              `<!-- paste link after posting -->`,
              ``,
              `---`,
              ``,
              `*${week} · Maintained by [@P-r-e-m-i-u-m](https://github.com/P-r-e-m-i-u-m)*`
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["weekly-progress"],
            });
